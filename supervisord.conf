[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:dashboard]
command=gosu appuser python -m uvicorn app.main:app --host 127.0.0.1 --port 8000
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DATA_DIR="/app/data",CONFIG_PATH="/config/config.json"

[program:jupyterlab]
command=gosu appuser jupyter lab --ip=127.0.0.1 --port=8888 --no-browser --ServerApp.token='' --ServerApp.password='' --ServerApp.base_url=/lab/ --ServerApp.allow_origin=* --notebook-dir=/app/notebooks
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/app",CONFIG_PATH="/config/config.json"

[program:caddy]
command=caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
