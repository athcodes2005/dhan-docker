services:
  dashboard:
    build: .
    container_name: dhan-dashboard
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /home/appuser
      - /var/run
      - /var/log
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./config.json:/app/config.json
      - ./dhan-chrome:/app/dhan-chrome
      - ./dhan_instruments.db:/app/dhan_instruments.db
      - ./portfolio_history.json:/app/portfolio_history.json

  lab:
    build:
      context: .
      dockerfile: Dockerfile.lab
    container_name: dhan-lab
    restart: unless-stopped
    expose:
      - "8888"
    env_file:
      - .env
    volumes:
      - ./config.json:/app/config.json:ro
      - ./notebooks:/app/notebooks

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: dhan-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - lab

volumes:
  caddy_data:
  caddy_config:
