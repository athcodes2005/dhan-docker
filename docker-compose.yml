services:
  dhan:
    build: .
    container_name: dhan-trading
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8888:8888"
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Asia/Kolkata}
    volumes:
      - config:/config
      - data:/app/data
      - notebooks:/app/notebooks

volumes:
  config:
  data:
  notebooks:
